<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrosol | Hardware Simulation</title>
    <style>
        :root {
            --primary: #0055ff;
            --danger: #ff3e3e;
            --success: #00ff88;
            --bg-color: #ffffff;
            --text-main: #0f172a;
            --panel: #f1f5f9;
            --text-dim: #475569;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BRANDING --- */
        .app-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 100px;
            z-index: 1000;
        }

        .back-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            background: #0f172a;
            color: #fff;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .back-nav:hover { background: var(--primary); }

        /* --- DASHBOARD HEADER --- */
        .dashboard-header {
            text-align: center;
            margin-top: 80px; /* Space for logo */
            margin-bottom: 30px;
            width: 90%;
        }

        h1 { 
            font-size: 2.2rem; 
            letter-spacing: 2px; 
            margin: 0; 
            color: var(--primary); 
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 136, 0.1);
            color: #047857;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 10px;
            border: 1px solid var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 1.5s infinite;
        }

        /* --- MAIN SIMULATION HUB --- */
        .simulation-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobile First */
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 80px; /* Space for nav button */
        }

        /* Tablet and Desktop Layout */
        @media (min-width: 900px) {
            .simulation-grid {
                grid-template-columns: 1fr 350px;
            }
        }

        .hardware-visual {
            background: var(--panel);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .unit-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 350px;
            margin: 20px 0;
        }

        .unit-base-img {
            width: 100%;
            filter: drop-shadow(0 0 10px rgba(0, 85, 255, 0.05));
        }

        /* --- INTERACTIVE HOTSPOTS --- */
        .hotspot {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--primary);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            width: 100px;
            color: var(--text-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .hotspot:hover { transform: scale(1.05); background: var(--primary); color: white; }

        /* Responsive hotspot positioning */
        #carbon-zone { top: 20%; left: -30px; }
        #uv-zone { bottom: 20%; right: -30px; }
        
        @media (min-width: 500px) {
            #carbon-zone { left: -50px; }
            #uv-zone { right: -50px; }
        }

        .health-bar-bg {
            width: 100%;
            height: 5px;
            background: #cbd5e1;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            width: 100%;
            background: var(--success);
            transition: width 0.5s ease;
        }

        .low-health { background: var(--danger) !important; animation: flash 0.5s infinite; }

        /* --- SIDE CONTROLS --- */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            color: var(--text-main);
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        .console {
            background: #000;
            height: 150px;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--success);
            overflow-y: auto;
            border: 1px solid #333;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <img src="logo.png" alt="SunSip" class="app-logo">
    <a href="index.html" class="back-nav">← HUB</a>

    <div class="dashboard-header">
        <h1>HYDROSOL</h1>
        <div class="status-badge">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">SYSTEM OPTIMAL</span>
        </div>
        <p style="color: var(--text-dim); margin-top: 5px; font-size: 0.9rem;">
            Volume: <span id="liters-val" style="color: var(--text-main); font-weight: bold;">0</span> L
        </p>
    </div>

    <div class="simulation-grid">
        <div class="hardware-visual">
            <div class="unit-image-wrapper">
                <img src="hydrosol-front-view.png" alt="Unit" class="unit-base-img">
                
                <div id="carbon-zone" class="hotspot" onclick="repair('carbon')">
                    <span style="font-size: 9px; font-weight: bold;">CARBON POD</span>
                    <div class="health-bar-bg"><div id="bar-carbon" class="health-fill"></div></div>
                </div>

                <div id="uv-zone" class="hotspot" onclick="repair('uv')">
                    <span style="font-size: 9px; font-weight: bold;">UV-C PATHWAY</span>
                    <div class="health-bar-bg"><div id="bar-uv" class="health-fill"></div></div>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="card">
                <h4 style="margin: 0 0 15px 0;">📦 Inventory</h4>
                <div class="inventory-item">
                    <span>Carbon Pods: <b id="inv-carbon">2</b></span>
                    <button onclick="order('carbon')">Order</button>
                </div>
                <div class="inventory-item">
                    <span>UV-C Bulbs: <b id="inv-uv">1</b></span>
                    <button onclick="order('uv')">Order</button>
                </div>
            </div>

            <div class="card">
                <h4 style="margin: 0 0 15px 0;">⚙️ Operations</h4>
                <button style="width: 100%; margin-bottom: 10px;" onclick="processWater(50)">Process 50L</button>
                <button style="width: 100%; background: #475569;" onclick="toggleAuto()">Toggle Auto-Wear</button>
            </div>

            <div class="console" id="console">
                > Initializing Hardware Link...<br>
                > SunSip Solar-Active Grid: ONLINE<br>
                > Ready for Telemetry Data.
            </div>
        </div>
    </div>

    <script>
        // --- DATA STATE ---
        let state = {
            liters: 0,
            carbonHealth: 100,
            uvHealth: 100,
            invCarbon: 2,
            invUv: 1,
            autoWear: false
        };

        // --- CORE FUNCTIONS ---
        function log(msg) {
            const consoleBox = document.getElementById('console');
            consoleBox.innerHTML += `<br>> ${msg}`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function updateUI() {
            // Update Text
            document.getElementById('liters-val').innerText = state.liters;
            document.getElementById('inv-carbon').innerText = state.invCarbon;
            document.getElementById('inv-uv').innerText = state.invUv;

            // Update Bars
            const cBar = document.getElementById('bar-carbon');
            const uBar = document.getElementById('bar-uv');
            cBar.style.width = state.carbonHealth + '%';
            uBar.style.width = state.uvHealth + '%';

            // Warning Colors
            state.carbonHealth < 25 ? cBar.classList.add('low-health') : cBar.classList.remove('low-health');
            state.uvHealth < 25 ? uBar.classList.add('low-health') : uBar.classList.remove('low-health');

            // Global Status
            if(state.carbonHealth <= 0 || state.uvHealth <= 0) {
                document.getElementById('status-text').innerText = "SYSTEM CRITICAL";
                document.getElementById('status-dot').style.background = "var(--danger)";
            } else {
                document.getElementById('status-text').innerText = "SYSTEM OPTIMAL";
                document.getElementById('status-dot').style.background = "var(--success)";
            }
        }

        function processWater(amt) {
            if(state.carbonHealth <= 0 || state.uvHealth <= 0) {
                log("ERROR: Maintenance required.");
                return;
            }
            state.liters += amt;
            state.carbonHealth -= (amt * 0.2);
            state.uvHealth -= (amt * 0.1);
            
            // Clamp at 0
            if(state.carbonHealth < 0) state.carbonHealth = 0;
            if(state.uvHealth < 0) state.uvHealth = 0;

            log(`Processed ${amt}L. Telemetry updated.`);
            updateUI();
        }

        function repair(type) {
            if(type === 'carbon' && state.invCarbon > 0) {
                state.carbonHealth = 100;
                state.invCarbon--;
                log("Carbon Pod installed.");
            } else if (type === 'uv' && state.invUv > 0) {
                state.uvHealth = 100;
                state.invUv--;
                log("UV-C Bulb replaced.");
            } else {
                log("REPAIR FAILED: No parts.");
            }
            updateUI();
        }

        function order(type) {
            if(type === 'carbon') state.invCarbon++;
            if(type === 'uv') state.invUv++;
            log(`Order placed: 1x ${type.toUpperCase()}.`);
            updateUI();
        }

        function toggleAuto() {
            state.autoWear = !state.autoWear;
            log(`Auto-Sim: ${state.autoWear ? 'ON' : 'OFF'}`);
        }

        // Auto-simulation Loop
        setInterval(() => {
            if(state.autoWear) processWater(1);
        }, 1000);

    </script>
</body>
</html>
