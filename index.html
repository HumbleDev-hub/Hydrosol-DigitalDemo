<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunSip | Hydrosol Command</title>
    <style>
        :root {
            --primary: #0055ff;
            --secondary: #00f2ff;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- BRANDING: TOP LEFT LOGO --- */
        .app-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 120px; 
            height: auto;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        /* Responsive Logo */
        @media (max-width: 600px) {
            .app-logo {
                width: 90px;
                top: 15px;
                left: 15px;
            }
        }

        .hub-container {
            width: 90%;
            max-width: 1100px;
            text-align: center;
            padding: 80px 0 40px 0; /* Top padding to accommodate fixed logo */
        }

        /* --- HEADER SECTION --- */
        header {
            margin-bottom: 50px;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(90deg, var(--dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
        }

        /* --- NAVIGATION GRID --- */
        .nav-grid {
            display: grid;
            /* Mobile first: 1 column, then switch to auto-fit */
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 500px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 900px) {
            .nav-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .nav-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(0, 85, 255, 0.15);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: #f1f5f9;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .nav-card:hover .icon-circle {
            background: var(--primary);
            color: white;
            transform: rotate(-5deg) scale(1.05);
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 60px;
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .sunsip-accent {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="SunSip" class="app-logo">

    <div class="hub-container">
        <header>
            <span class="brand-subtitle">SunSip Water Systems</span>
            <h1>HYDROSOL</h1>
        </header>

        <div class="nav-grid">
            <a href="Simulation.html" class="nav-card">
                <div class="icon-circle">⚙️</div>
                <h3>Simulation</h3>
                <p>Live diagnostics & component health.</p>
            </a>

            <a href="3dmodel.html" class="nav-card">
                <div class="icon-circle">🧊</div>
                <h3>3D Interactive</h3>
                <p>Explore the MS-2000 unit anatomy.</p>
            </a>

            <a href="2dviewer.html" class="nav-card">
                <div class="icon-circle">📐</div>
                <h3>Technical</h3>
                <p>CAD Blueprints & schematics.</p>
            </a>

            <a href="manual.html" class="nav-card">
                <div class="icon-circle">📖</div>
                <h3>Manuals</h3>
                <p>Operator & maintenance guides.</p>
            </a>
        </div>

        <footer>
            © 2026 <span class="sunsip-accent">SunSip Water Systems</span>. Proprietary technology.
        </footer>
    </div>

</body>
</html>
</html>
